<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TinyTangent Studios</title>
<meta name="description" content="Property photography, videography and drone services — West Yorkshire">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1B2A;--gold:#C9A84C;--white:#ffffff;--muted:#888880;}
body{
  background:var(--navy);
  color:var(--white);
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2rem 1rem;
}
.card{
  width:100%;
  max-width:380px;
  text-align:center;
}
.logo{
  font-size:1.6rem;
  font-weight:300;
  letter-spacing:0.05em;
  margin-bottom:0.3rem;
}
.logo em{color:var(--gold);font-style:italic;}
.tagline{
  font-size:0.75rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:2rem;
}
.divider{
  width:3rem;height:1px;
  background:var(--gold);
  margin:0 auto 2rem;
}
.link-btn{
  display:flex;
  align-items:center;
  gap:1rem;
  width:100%;
  padding:0.9rem 1.2rem;
  margin-bottom:0.75rem;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;
  color:var(--white);
  text-decoration:none;
  font-size:0.9rem;
  letter-spacing:0.05em;
  transition:background 0.2s, border-color 0.2s;
}
.link-btn:hover{background:rgba(201,168,76,0.12);border-color:var(--gold);}
.link-btn svg{width:22px;height:22px;flex-shrink:0;color:var(--gold);}
.link-btn span{flex:1;text-align:left;}
.link-btn .arrow{color:var(--muted);font-size:0.8rem;}
.footer{
  margin-top:2rem;
  font-size:0.7rem;
  color:var(--muted);
  letter-spacing:0.1em;
}
</style>
</head>
<body>
<div class="card">
  <p class="logo">TinyTangent <em>Studios</em></p>
  <p class="tagline">Photography · Videography · Drone</p>
  <div class="divider"></div>

  <a class="link-btn" href="https://tinytangentstudios.co.uk" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
    <span>tinytangentstudios.co.uk</span>
    <span class="arrow">↗</span>
  </a>

  <a class="link-btn" href="https://www.instagram.com/tinytangentstudios" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>
    <span>@tinytangentstudios</span>
    <span class="arrow">↗</span>
  </a>

  <a class="link-btn" href="https://www.tiktok.com/@tinytangentstudios" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12a4 4 0 104 4V4a5 5 0 005 5"/></svg>
    <span>@tinytangentstudios</span>
    <span class="arrow">↗</span>
  </a>

  <a class="link-btn" href="https://youtube.com/@tinytangent" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 001.46 6.42 29 29 0 001 12a29 29 0 00.46 5.58 2.78 2.78 0 001.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 001.95-1.96A29 29 0 0023 12a29 29 0 00-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg>
    <span>@tinytangent</span>
    <span class="arrow">↗</span>
  </a>

  <a class="link-btn" href="mailto:kiran@tinytangentstudios.co.uk">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    <span>kiran@tinytangentstudios.co.uk</span>
    <span class="arrow">↗</span>
  </a>

  <p class="footer">West Yorkshire · CAA Registered</p>
</div>
</body>
</html>
